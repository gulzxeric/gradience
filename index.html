<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gradience · BG</title>

<!-- ═══════════════════════════════════
     🎨 配色配置
     色值格式：'#rrggbb'
     ═══════════════════════════════════ -->
<script>
const CFG = {
  defaultColors: ['#0f0c29','#302b63','#24243e'],
  angle: 135,
  palettes: [
    { name: 'Abyss',  colors: ['#0f0c29','#302b63','#24243e'] },
    { name: 'Navy',   colors: ['#1a1a2e','#16213e','#0f3460'] },
    { name: 'Aurora', colors: ['#2d1b69','#11998e','#38ef7d'] },
    { name: 'Ember',  colors: ['#f12711','#f5af19','#f12711'] },
    { name: 'Ocean',  colors: ['#4facfe','#00f2fe','#43e97b'] },
    { name: 'Dawn',   colors: ['#ffecd2','#fcb69f','#f6d365'] },
    { name: 'Black',  colors: ['#000','#000','#000'] },
    { name: 'White',  colors: ['#fff','#fff','#fff'] },
  ],
};
</script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0c0c14;
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background-size: 400% 400%;
  animation: drift 18s ease infinite;
}
@keyframes drift {
  0%   { background-position: 0% 50%; }
  25%  { background-position: 100% 0%; }
  50%  { background-position: 100% 100%; }
  75%  { background-position: 0% 100%; }
  100% { background-position: 0% 50%; }
}

.curtain {
  position: fixed; inset: 0; z-index: 2;
  clip-path: circle(0% at 100% 100%);
  pointer-events: none;
  transition: clip-path 0.9s cubic-bezier(0.4,0,0.2,1);
}
.curtain.active { clip-path: circle(150% at 100% 100%); }
.curtain.reveal {
  transition: clip-path 1s cubic-bezier(0,0,0.2,1);
  clip-path: circle(0% at 100% 100%);
}

.code {
  position: fixed; top: 1.5rem; left: 50%; z-index: 10;
  transform: translateX(-50%);
  font-family: monospace; font-size: 0.7rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.05em;
  transition: color 0.5s;
  text-align: center;
}
.code:hover { color: rgba(255,255,255,0.45); }

.palette {
  position: fixed; bottom: 2rem; left: 50%; z-index: 10;
  transform: translateX(-50%);
  display: flex; gap: 0.7rem; flex-wrap: wrap; justify-content: center;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 0.7rem 1rem;
  border-radius: 2rem;
  border: 1px solid rgba(255,255,255,0.06);
}
.dot {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.12);
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
  flex-shrink: 0;
}
.dot:hover { transform: scale(1.25); border-color: rgba(255,255,255,0.4); }
.dot.active { border-color: #fff; transform: scale(1.3); box-shadow: 0 0 20px rgba(167,139,250,0.35); }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="curtain" id="curtain"></div>
<div class="code" id="code"></div>

<div class="palette" id="palette"></div>

<script>
(function() {
  var bg = document.getElementById('bg');
  var ct = document.getElementById('curtain');
  var cd = document.getElementById('code');
  var pl = document.getElementById('palette');
  var C = CFG;
  var cur = C.defaultColors.slice();
  var busy = false;

  // ── 纯 JS 颜色工具（无外部依赖） ──

  function hex2rgb(h) {
    return [
      parseInt(h.slice(1, 3), 16),
      parseInt(h.slice(3, 5), 16),
      parseInt(h.slice(5, 7), 16)
    ];
  }

  function rgb2hex(r, g, b) {
    return '#' + [r, g, b].map(function(v) {
      return Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, '0');
    }).join('');
  }

  function mix(a, b, t) {
    var ca = hex2rgb(a), cb = hex2rgb(b);
    return rgb2hex(
      ca[0] + (cb[0] - ca[0]) * t,
      ca[1] + (cb[1] - ca[1]) * t,
      ca[2] + (cb[2] - ca[2]) * t
    );
  }

  function avg(colors) {
    var r = 0, g = 0, b = 0, n = colors.length;
    for (var i = 0; i < n; i++) {
      var c = hex2rgb(colors[i]);
      r += c[0]; g += c[1]; b += c[2];
    }
    return rgb2hex(r / n, g / n, b / n);
  }

  // ── 渲染 ──

  C.palettes.forEach(function(p, i) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.style.background = 'linear-gradient(135deg,' + p.colors.join(',') + ')';
    d.dataset.c1 = p.colors[0];
    d.dataset.c2 = p.colors[1];
    d.dataset.c3 = p.colors[2];
    d.title = p.name;
    pl.appendChild(d);
  });

  function apply(c1, c2, c3) {
    var css = 'linear-gradient(' + C.angle + 'deg,' + c1 + ',' + c2 + ',' + c3 + ')';
    bg.style.background = css;
    bg.style.backgroundSize = '400% 400%';
    cd.textContent = css;
  }

  apply(C.defaultColors[0], C.defaultColors[1], C.defaultColors[2]);
  ct.style.background = avg(cur);

  // ── 切换 ──

  function setBg(c1, c2, c3, el) {
    if (busy) return;
    busy = true;
    document.querySelectorAll('.dot').forEach(function(d) { d.classList.remove('active'); });
    if (el) el.classList.add('active');

    ct.style.background = avg([mix(cur[0], c1, 0.5), mix(cur[1], c2, 0.5), mix(cur[2], c3, 0.5)]);

    ct.classList.remove('reveal');
    void ct.offsetWidth;
    ct.classList.add('active');

    setTimeout(function() {
      apply(c1, c2, c3);
      cur = [c1, c2, c3];
      ct.classList.remove('active');
      ct.classList.add('reveal');
      setTimeout(function() { ct.classList.remove('reveal'); busy = false; }, 1050);
    }, 920);
  }

  document.querySelectorAll('.dot').forEach(function(d) {
    d.addEventListener('click', function() {
      if (d.classList.contains('active')) return;
      setBg(d.dataset.c1, d.dataset.c2, d.dataset.c3, d);
    });
  });
})();
</script>
</body>
</html>
